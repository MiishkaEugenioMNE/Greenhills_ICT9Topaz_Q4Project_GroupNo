    <style>
        .login-box {
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background: white;
        }

        .login-box h6 {
            background: #0E1428;
            color: #fff;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: -8px;
        }

        .login-box input.form-control {
            border-radius: 20px;
            border: 1px solid #0E1428;
            background: transparent;
            padding: 10px 15px;
            text-align: center;
            box-shadow: none;
        }

        .login-box input.form-control:focus {
            outline: none;
            border-color: #0E1428;
            box-shadow: 0 0 0 0.15rem rgba(14, 20, 40, 0.25);
        }
        .login-box .btn {
            border-radius: 20px;
            background: #0E1428;
            border: none;
            color: #fff;
            transition: 0.3s;
        }

        .login-box .btn:hover {
            background: #0E1428;
            opacity: 0.85;
        }

        .login-box a {
            font-size: 12px;
            text-decoration: none;
            color: #0E1428;
        }

        .login-box a:hover {
            text-decoration: underline;
        }

        /* FOOTER */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
        }
    </style>
